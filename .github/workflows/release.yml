name: Tag Release Pipeline

on:
  push:
    branches:
      - main  # mainブランチにPush（マージ含む）されたら実行

jobs:
  tag-check:
    runs-on: self-hosted
    # Approval Gate（承認ゲート） リポジトリをPublicにする必要があります。
    # environment: production

    steps:
      # GitHub からソースコードを取得
      - name: Checkout source
        uses: actions/checkout@v4
        # 最新の 1 コミットだけを取得（パケット節約）
        with:
          fetch-depth: 1

      # ブランチ名と日時（ログ出力）
      - name: Show branch and deployment id
        run: |
          echo "Branch name = ${{ github.ref_name }}"
          echo "Time = $(date +'%Y-%m-%d %H:%M')"

      # SSH Agent 起動
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # known_hosts 登録（SSH 初回接続の接続確認を自動回避）
      - name: Add known hosts
        run: ssh-keyscan -H ${{ vars.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Run Server Spec Collection
        run: |
          cd ansible
          # get_spec.yml を実行
          ansible-playbook -i hosts get_spec.yml

      - name: Upload Server Spec as Artifact
        uses: actions/upload-artifact@v4
        with:
          # ダウンロード時のファイル名（任意）
          name: server-spec-report
          # 保存したいファイルのパス
          path: docs/server_spec.txt
          # 保存期間（実務では容量節約のため短めに設定）
          retention-days: 5

