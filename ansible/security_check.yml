- name: Security Port Check
  hosts: localhost
  connection: local
  tasks:
    - name: 1. リッスン状態のTCPポートを取得
      ansible.builtin.shell: "ss -ltn | grep LISTEN"
      register: port_status

    - name: 2. 異常判定（80番ポートのチェック）
      ansible.builtin.set_fact:
        security_alert: "{{ '0.0.0.0:80' in port_status.stdout or ':::80' in port_status.stdout }}"

    - name: 3. セキュリティレポートの生成
      ansible.builtin.copy:
        content: |
          # セキュリティ診断レポート
          - 診断日時: {{ ansible_facts['date_time']['year'] }}/{{ ansible_facts['date_time']['month'] }}/{{ ansible_facts['date_time']['day'] }} {{ ansible_facts['date_time']['hour'] }}:{{ ansible_facts['date_time']['minute'] }} (UTC)
          - ホスト名: {{ ansible_facts['hostname'] }}
          - 結果: {{ '⚠️ WARNING' if security_alert else '✅ PASS' }}
          
          ## 詳細
          {{ port_status.stdout }}
        dest: "../docs/security_report.txt"

    - name: 4. 異常時に環境変数経由でGitHubへ通知内容を渡す（デバッグ用）
      ansible.builtin.debug:
        msg: "ATTENTION: Web port (80) detected!"
      when: security_alert
